<svg width="160" height="44" viewBox="0 0 160 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Percelo">
  <title>Percelo</title>

  <!-- ── Parcel mark ── -->
  <!-- Land parcel boundary: slightly irregular quad (authentic cadastral feel) -->
  <polygon points="8,4 41,6 39,40 5,38"
    fill="#dbeeff" stroke="#0f62fe" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Internal subdivision line (~35% from top) -->
  <line x1="6.5" y1="16" x2="40" y2="17.5"
    stroke="#0f62fe" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Second subdivision: short vertical in lower parcel -->
  <line x1="24" y1="17.5" x2="23" y2="40"
    stroke="#0f62fe" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Location pin (donut) in upper parcel, right sub-field -->
  <circle cx="31" cy="11" r="6" fill="#0f62fe"/>
  <circle cx="31" cy="11" r="2.6" fill="#ffffff"/>

  <!-- Subtle pulse ring -->
  <circle cx="31" cy="11" r="9" stroke="#0f62fe" stroke-width="1"
    stroke-opacity="0.25" fill="none"/>

  <!-- ── Wordmark ── -->
  <text x="51" y="30"
    font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" letter-spacing="-0.5"
    fill="#161616">Percelo</text>
</svg>
