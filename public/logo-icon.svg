<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Percelo">
  <title>Percelo</title>

  <!-- Parcel boundary -->
  <polygon points="4,4 38,6 36,40 2,38"
    fill="#dbeeff" stroke="#0f62fe" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Subdivision lines -->
  <line x1="3" y1="17" x2="37" y2="18.5"
    stroke="#0f62fe" stroke-width="1.3" stroke-opacity="0.4"/>
  <line x1="21" y1="18.5" x2="20" y2="40"
    stroke="#0f62fe" stroke-width="1.3" stroke-opacity="0.3"/>

  <!-- Location pin (donut) -->
  <circle cx="28" cy="11" r="6.5" fill="#0f62fe"/>
  <circle cx="28" cy="11" r="2.8" fill="#ffffff"/>
  <circle cx="28" cy="11" r="10" stroke="#0f62fe" stroke-width="1.2"
    stroke-opacity="0.22" fill="none"/>
</svg>
